<style>
  .blog-wrap { max-width: 1180px; margin: 0 auto; padding: 0 16px; }
  .blog-hero { padding: 26px 0 8px; }
  .blog-hero h1 { font-weight: 700; }
  .blog-hero .lead { color: #566; }
  .cat-badge { display:inline-block; font-size:11px; letter-spacing:.04em; text-transform:uppercase;
               color:#1f77b4; background:#eef4fb; border:1px solid #d6e6f5; border-radius:20px; padding:2px 10px; }
  /* index cards */
  .cat-title { margin:26px 0 10px; font-size:15px; color:#334; border-bottom:2px solid #eee; padding-bottom:6px; }
  .post-card { display:block; border:1px solid #e6e6e6; border-radius:10px; padding:14px 16px; height:100%;
               text-decoration:none; color:inherit; transition:box-shadow .15s, transform .15s; background:#fff; }
  .post-card:hover { box-shadow:0 6px 18px rgba(0,0,0,.08); transform:translateY(-2px); text-decoration:none; }
  .post-card h5 { margin:6px 0 4px; color:#123; font-size:16px; }
  .post-card p { margin:0; color:#667; font-size:13px; }
  .post-num { float:right; color:#bcc; font-weight:700; font-size:18px; }
  /* article layout */
  .blog-side { position:sticky; top:12px; font-size:13.5px; }
  .blog-side .side-cat { font-size:11px; text-transform:uppercase; color:#99a; margin:14px 0 4px; letter-spacing:.04em; }
  .blog-side a { display:block; padding:4px 8px; border-radius:6px; color:#345; text-decoration:none; }
  .blog-side a:hover { background:#f2f6fa; }
  .blog-side a.active { background:#1f77b4; color:#fff; font-weight:600; }
  .article { max-width:760px; font-size:16px; line-height:1.65; color:#233; }
  .article h1 { font-weight:700; margin:6px 0 4px; }
  .article .subtitle { font-size:18px; color:#667; margin:0 0 18px; }
  .article h3 { margin:26px 0 8px; color:#123; }
  .article ul, .article ol { padding-left:22px; }
  .article li { margin:5px 0; }
  .article code { background:#f3f3f3; padding:1px 5px; border-radius:4px; font-size:14px; }
  .figsvg { display:block; margin:16px auto 2px; border:1px solid #eee; border-radius:8px; background:#fff; padding:6px; }
  .cap { text-align:center; font-size:13px; color:#889; margin:0 0 14px; font-style:italic; }
  .keybox { background:#eef4fb; border-left:4px solid #1f77b4; border-radius:6px; padding:12px 16px; margin:16px 0; }
  .analogy { background:#fff8e8; border-left:4px solid #e0a300; border-radius:6px; padding:12px 16px; margin:16px 0; }
  .paperbox { background:#eef7ee; border-left:4px solid #2ca02c; border-radius:6px; padding:12px 16px; margin:16px 0; }
  .formula { font-family:ui-monospace,Consolas,monospace; background:#fff; border:1px dashed #bcd;
             padding:8px 12px; border-radius:6px; text-align:center; margin:6px 0; }
  .btable { border-collapse:collapse; width:100%; margin:14px 0; font-size:14.5px; }
  .btable th, .btable td { border:1px solid #e2e2e2; padding:7px 10px; text-align:left; }
  .btable th { background:#f6f8fa; }
  .prevnext { display:flex; justify-content:space-between; gap:12px; margin:28px 0 40px; border-top:1px solid #eee; padding-top:16px; }
  .prevnext a { max-width:48%; text-decoration:none; color:#1f77b4; }
  .prevnext .lbl { display:block; font-size:11px; color:#99a; text-transform:uppercase; }
  .related { background:#fafafa; border:1px solid #eee; border-radius:8px; padding:12px 16px; margin:24px 0; }
  .related a { color:#1f77b4; }
</style>
